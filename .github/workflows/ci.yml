name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Pint + Pest + MySQL migrate
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: smoothware_ci
          MYSQL_USER: smoothware
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -psecret"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, pdo_sqlite, bcmath, intl, zip
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

      - name: Run tests (Pest, in-memory SQLite)
        run: php artisan test

      # Foundation migrations run on SQLite in the test suite; this step proves
      # they also apply cleanly on MySQL 8 (catches MySQL-specific schema issues
      # before they reach production).
      - name: MySQL migration smoke test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: smoothware_ci
          DB_USERNAME: smoothware
          DB_PASSWORD: secret
        run: php artisan migrate --force
