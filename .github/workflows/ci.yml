name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # 8.4 is the floor composer.json promises; 8.5 is what we develop on. Testing
    # both means a 8.5-only idiom can't silently break the floor we support.
    name: PHP ${{ matrix.php }} — Pint + Pest + Postgres migrate
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    services:
      postgres:
        # Matches production (pgvector image); the extension is unused for now.
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: smoothware_ci
          POSTGRES_USER: smoothware
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U smoothware -d smoothware_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_pgsql, pdo_sqlite, bcmath, intl, zip
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

      - name: Run tests (Pest, in-memory SQLite)
        run: php artisan test

      # Foundation + feature migrations run on SQLite in the test suite; this step
      # proves they also apply cleanly on the real engine (PostgreSQL 17).
      - name: Postgres migration smoke test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: smoothware_ci
          DB_USERNAME: smoothware
          DB_PASSWORD: secret
        run: php artisan migrate --force
