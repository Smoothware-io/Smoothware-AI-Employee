# Local development services for Smoothware AI Employee.
# Only infrastructure lives here (DB); the Laravel app runs on the host via
# `php artisan serve`. Bring it up with:  docker compose up -d
services:
  postgres:
    # pgvector image = PostgreSQL 17 + the `vector` extension preinstalled. We do
    # NOT enable the extension yet (RAG uses brute-force cosine in PHP for now,
    # see ARCHITECTURE §8); the image just makes adopting pgvector a one-liner
    # later (`CREATE EXTENSION vector`).
    image: pgvector/pgvector:pg17
    container_name: smoothware-postgres
    restart: unless-stopped
    # Host port 5434 -> container 5432. 5432/5433 are used by other local
    # containers on this machine, so we deliberately pick 5434.
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: smoothware
      POSTGRES_USER: smoothware
      POSTGRES_PASSWORD: secret
    volumes:
      - smoothware-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smoothware -d smoothware"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  smoothware-postgres-data:
