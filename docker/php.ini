; Production PHP settings.
;
; The base image ships php.ini-development. These are the deltas that matter for
; a public app handling personal data.

; --- Error handling --------------------------------------------------------
; display_errors leaks file paths, SQL, and sometimes payload contents to whoever
; triggered the error. On an app that processes call transcripts and contact
; details, a stack trace in the browser is a data leak, not a debugging aid.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; --- OPcache ---------------------------------------------------------------
opcache.enable = 1
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; The container is immutable — files cannot change under a running process — so
; stat'ing every file on every request is pure waste. A deploy replaces the whole
; container, which is what invalidates the cache.
opcache.validate_timestamps = 0

; --- Limits ----------------------------------------------------------------
memory_limit = 512M
; CSV lead imports can be large, and the importer stages every row.
upload_max_filesize = 32M
post_max_size = 32M
max_execution_time = 120

; --- Sessions / cookies ----------------------------------------------------
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1

; Do not advertise the PHP version in response headers.
expose_php = Off

date.timezone = "Europe/Amsterdam"
